<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events · Mar 19–24 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Trajan+Pro+3:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&family=Abril+Fatface&family=DM+Sans:wght@300;400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Raleway:wght@100;200;400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  transition: background 0.4s, color 0.4s;
}

/* ============================================================
   THEME SELECTOR BAR
   ============================================================ */
#theme-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  flex-wrap: wrap;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#theme-bar span {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-right: 4px;
  opacity: 0.6;
}
.theme-btn {
  border: none;
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 2px;
  transition: all 0.2s;
}
.theme-btn.active { opacity: 1; transform: scale(1.05); }
.theme-btn:not(.active) { opacity: 0.5; }

/* Search bar */
#search-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
#search {
  border: none;
  outline: none;
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 2px;
  width: 200px;
  background: transparent;
  border-bottom: 1px solid currentColor;
}
#count {
  font-size: 11px;
  opacity: 0.5;
  white-space: nowrap;
}

/* Day filter tabs */
#day-tabs {
  display: flex;
  gap: 6px;
  padding: 8px 20px;
  flex-wrap: wrap;
}
.day-tab {
  cursor: pointer;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 1px;
  transition: all 0.2s;
  border: 1px solid transparent;
  user-select: none;
}

/* ============================================================
   MAIN CONTENT
   ============================================================ */
#main {
  padding: 0 20px 60px;
  max-width: 1400px;
  margin: 0 auto;
}
.day-group { margin-bottom: 48px; }
.day-heading {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  padding: 16px 0 12px;
  border-bottom: 1px solid;
  margin-bottom: 20px;
  opacity: 0.5;
}
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ============================================================
   EVENT CARD BASE
   ============================================================ */
.event-card {
  padding: 18px 20px;
  border-radius: 2px;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.event-card:hover { transform: translateY(-2px); }
.event-time {
  font-size: 11px;
  letter-spacing: 0.1em;
  opacity: 0.55;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.event-title {
  font-size: 16px;
  line-height: 1.3;
  margin-bottom: 4px;
  word-break: break-word;
}
.event-venue {
  font-size: 12px;
  opacity: 0.65;
  margin-bottom: 10px;
}
.event-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 1px;
  letter-spacing: 0.05em;
}
.event-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 11px;
  margin-top: 8px;
  gap: 8px;
}
.event-price { opacity: 0.7; }
.event-link {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.5;
  text-decoration: none;
  border-bottom: 1px dashed;
  cursor: pointer;
  padding-bottom: 1px;
}
.event-link:hover { opacity: 1; }
.event-org { font-size: 10px; opacity: 0.45; }
.hidden { display: none !important; }

/* ============================================================
   HEADER
   ============================================================ */
header {
  padding: 48px 20px 24px;
  max-width: 1400px;
  margin: 0 auto;
}
.header-eyebrow {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.45;
  margin-bottom: 10px;
}
.header-title {
  line-height: 0.9;
  margin-bottom: 16px;
}
.header-sub {
  font-size: 13px;
  opacity: 0.5;
  letter-spacing: 0.05em;
}

/* ============================================================
   THEME 1 — FRACTURE / KINTSUGI
   ============================================================ */
body.t-fracture {
  background: #0e0c0a;
  color: #c8bfb0;
  font-family: 'DM Sans', sans-serif;
}
body.t-fracture::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}
body.t-fracture #theme-bar {
  background: rgba(14,12,10,0.9);
  border-bottom: 1px solid rgba(180,120,60,0.15);
}
body.t-fracture .theme-btn { font-family: 'DM Sans', sans-serif; }
body.t-fracture .theme-btn.active { background: #7a4a20; color: #e8d5b0; }
body.t-fracture .theme-btn:not(.active) { background: rgba(255,255,255,0.04); color: #c8bfb0; }
body.t-fracture #search { color: #c8bfb0; border-color: rgba(200,180,140,0.2); }

body.t-fracture #day-tabs { border-bottom: 1px solid rgba(180,120,60,0.1); }
body.t-fracture .day-tab { color: #9a8870; border-color: transparent; }
body.t-fracture .day-tab:hover { color: #c8a870; border-color: rgba(180,120,60,0.3); }

body.t-fracture .header-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(40px,8vw,88px); color: #d4c4a8; }
body.t-fracture .header-eyebrow, body.t-fracture .header-sub { font-family: 'DM Sans', sans-serif; }
body.t-fracture .day-heading { border-color: rgba(180,120,60,0.2); color: #9a7050; }
body.t-fracture .event-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(180,120,60,0.12);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
}
body.t-fracture .event-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,140,60,0.3), transparent);
}
body.t-fracture .event-card:hover {
  border-color: rgba(180,120,60,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,0,0,0.2);
}
body.t-fracture .event-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 17px; color: #d4c4a4; }
body.t-fracture .event-venue { font-size: 11px; letter-spacing: 0.05em; }
body.t-fracture .tag { background: rgba(120,70,20,0.25); color: #b08040; border: 1px solid rgba(180,120,60,0.2); }
body.t-fracture .event-link { color: #b08040; border-color: rgba(180,120,60,0.3); }

/* ============================================================
   THEME 2 — TRANSMISSION / DEAD CHANNEL
   ============================================================ */
body.t-channel {

}

body.t-channel .header-title { font-family: 'Space Mono', monospace; font-size: clamp(24px,5vw,56px); color: #00ff44; text-shadow: 0 0 20px rgba(0,255,68,0.4); letter-spacing: -0.02em; }
body.t-channel .header-eyebrow { font-family: 'Share Tech Mono', monospace; color: #446644; }
body.t-channel .header-sub { font-family: 'Share Tech Mono', monospace; }

  content: attr(data-idx);

  top: 8px; right: 12px;

  background: linear-gradient(90deg, transparent, rgba(80,50,20,0.1), transparent);
}

   ============================================================ */

  font-family: 'Raleway', sans-serif;
}

body.t-fever .header-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(50px,12vw,130px); background: linear-gradient(135deg, #ff3c78, #c040ff, #40c8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.02em; line-height: 1; }

const DAYS = {
  'Thu': 'Thursday, March 19',
  'Fri': 'Friday, March 20',
  'Sat': 'Saturday, March 21',
  'Sun': 'Sunday, March 22',
  'Mon': 'Monday, March 23',
  'Tue': 'Tuesday, March 24'
};

let currentTheme = 't-fracture';
let currentDay = 'all';
let currentSearch = '';

function setTheme(t) {
  document.body.className = t;
  currentTheme = t;
  document.querySelectorAll('.theme-btn').forEach((btn, i) => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
}

function filterDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderEvents();
}

function filterEvents() {
  currentSearch = document.getElementById('search').value.toLowerCase();
  renderEvents();
}

function parseEvent(ev) {
  // Split title @ venue
  const atSplit = ev.title_venue.replace(/\u00a0/g, ' ').split('@ ');
  const title = atSplit[0].trim();
  const venue = atSplit.slice(1).join('@ ').trim();
  // parse price | age
  const pa = ev.price_age.split('|');
  const price = pa[0] ? pa[0].trim() : '';
  const age = pa[1] ? pa[1].trim() : '';
  return { ...ev, title, venue, price, age };
}

function getDayKey(dt) {
  const m = dt.match(/^(Thu|Fri|Sat|Sun|Mon|Tue)/);
  return m ? m[1] : '?';
}

function renderEvents() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  let filtered = EVENTS.map((ev, i) => ({ ...parseEvent(ev), idx: i }));

  // Day filter
  if (currentDay !== 'all') {
    filtered = filtered.filter(ev => getDayKey(ev.datetime) === currentDay);
  }

  // Search filter
  if (currentSearch) {
    filtered = filtered.filter(ev => {
      return (ev.title + ev.venue + ev.tags + ev.organizers + ev.datetime).toLowerCase().includes(currentSearch);
    });
  }

  const noRes = document.getElementById('no-results');
  document.getElementById('count').textContent = filtered.length + ' events';

  if (filtered.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  // Group by day
  const groups = {};
  filtered.forEach(ev => {
    const dk = getDayKey(ev.datetime);
    if (!groups[dk]) groups[dk] = [];
    groups[dk].push(ev);
  });

  const dayOrder = ['Thu','Fri','Sat','Sun','Mon','Tue'];
  dayOrder.forEach(dk => {
    if (!groups[dk]) return;
    const section = document.createElement('div');
    section.className = 'day-group';
    section.innerHTML = `<div class="day-heading">${DAYS[dk] || dk} &mdash; ${groups[dk].length} events</div>`;
    const grid = document.createElement('div');
    grid.className = 'events-grid';

    groups[dk].forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.setAttribute('data-idx', String(ev.idx + 1).padStart(3,'0'));

      // parse time from datetime
      const timeMatch = ev.datetime.match(/\(([^)]+)\)/);
      const time = timeMatch ? timeMatch[1] : ev.datetime;

      // tags
      const tagsHtml = ev.tags ? ev.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';

      // link text
      const linkHtml = ev.links ? `<span class="event-link">${ev.links}</span>` : '';

      // pulse dot for rave theme
      const pulseDot = currentTheme === 't-rave' ? '<span class="pulse-dot"></span>' : '';

      card.innerHTML = `
        <div class="event-time">${time}</div>
        <div class="event-title">${pulseDot}${ev.title}</div>
        <div class="event-venue">${ev.venue}</div>
        ${tagsHtml ? `<div class="event-tags">${tagsHtml}</div>` : ''}
        <div class="event-meta">
          <span class="event-price">${ev.price || ev.age ? [ev.price, ev.age].filter(Boolean).join(' · ') : ''}</span>
          <span style="display:flex;gap:8px;align-items:center;">
            ${ev.organizers ? `<span class="event-org">${ev.organizers}</span>` : ''}
            ${linkHtml}
          </span>
        </div>
      `;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

// Init
renderEvents();
document.getElementById('count').textContent = EVENTS.length + ' events';
</script>
